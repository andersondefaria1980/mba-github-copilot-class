networks:
  app-network:
    driver: bridge

volumes:
  pgdata:

services:
  postgres:
    image: postgres:15-alpine
    container_name: customerdb
    restart: always
    environment:
      POSTGRES_DB: customersdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d customersdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: customer-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/customersdb
      JWT_SECRET: your-secret-key-change-in-production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: customer-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app-network
